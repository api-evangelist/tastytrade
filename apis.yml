  - name: tastytrade DXLink Market Data Streaming API
    description: >
      Real-time market data streaming via DXLink, a WebSocket-based protocol
      backed by dxFeed. Clients fetch a quote token from the tastytrade REST API
      and use it to authenticate with the DXLink WebSocket endpoint. Supports
      subscriptions to quotes, greeks (implied volatility, delta, gamma, theta,
      vega), candles, and other market events for equities, options, futures,
      and crypto instruments. Sandbox quotes are 15-minute delayed.
    image: https://kinlane-productions2.s3.amazonaws.com/apis-json/apis-json-logo.jpg
    humanURL: https://developer.tastytrade.com/streaming-market-data/
    baseURL: wss://tasty-openapi-ws.dxfeed.com
    tags:
      - WebSocket
      - Streaming
      - Market Data
      - Quotes
      - Options Greeks
      - Real-Time
      - DXLink
      - dxFeed
    properties:
      - type: Documentation
        url: https://developer.tastytrade.com/streaming-market-data/
      - type: GettingStarted
        url: https://developer.tastytrade.com/streaming-market-data/

  - name: tastytrade Account Streamer API
    description: >
      WebSocket-based account streaming that delivers real-time notifications
      for order fills, position changes, account balance updates, and margin
      requirement changes. Clients authenticate using a tastytrade session token
      and subscribe to one or more accounts. The streamer supports automatic
      reconnection and delivers structured JSON notification messages.
    image: https://kinlane-productions2.s3.amazonaws.com/apis-json/apis-json-logo.jpg
    humanURL: https://developer.tastytrade.com/streaming-account-data/
    baseURL: wss://streamer.tastyworks.com
    tags:
      - WebSocket
      - Streaming
      - Account Updates
      - Orders
      - Positions
      - Real-Time
    properties:
      - type: Documentation
        url: https://developer.tastytrade.com/streaming-account-data/
      - type: GettingStarted
        url: https://developer.tastytrade.com/streaming-account-data/

