name: tastytrade
description: >
  tastytrade is an options-focused brokerage offering a public Open API that
  provides full read and write access to real-time account data, positions,
  balances, transaction history, market data, option chains, and order
  execution across equities, options, futures, and crypto. The API uses REST
  over HTTPS with JSON payloads for synchronous operations and WebSocket
  connections (DXLink for market data, dedicated account streamer for real-time
  account updates). OAuth 2.0 and session-token authentication are both
  supported, with a safe sandbox environment for development and testing.
image: https://kinlane-productions2.s3.amazonaws.com/apis-json/apis-json-logo.jpg
tags:
  - Finance
  - Brokerage
  - Trading
  - Options
  - Futures
  - Equities
  - Crypto
  - Market Data
  - WebSocket
