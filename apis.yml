apis:
  - name: tastytrade REST API
    description: >
      The core REST API for tastytrade provides programmatic access to accounts,
      customer information, balances, positions, transactions, orders, instruments,
      option chains, market data, watchlists, margin requirements, quote alerts,
      risk parameters, backtesting, and symbol search. All responses are JSON.
      Session tokens expire after 15 minutes; OAuth 2.0 long-lived refresh tokens
      are also available for partner integrations.
    image: https://kinlane-productions2.s3.amazonaws.com/apis-json/apis-json-logo.jpg
    humanURL: https://developer.tastytrade.com/
    baseURL: https://api.tastyworks.com
    tags:
