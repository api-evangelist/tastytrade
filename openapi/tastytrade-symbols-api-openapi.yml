swagger: '2.0'
info:
  title: Account Status accounts Symbols API
  version: 7.1.0
  description: Operations about accounts
host: api.tastyworks.com
produces:
- application/json
tags:
- name: Symbols
paths:
  /symbols/search/{symbol}:
    get:
      description: Returns an array of symbol data.
      produces:
      - application/json
      responses:
        '200':
          description: Returns an array of symbol data.
          schema:
            $ref: '#/definitions/SymbolData'
      parameters:
      - in: path
        name: symbol
        type: string
        required: true
        description: Symbol or fragment of a symbol to search, i.e. `AAP` will return AAP and AAPL data
      operationId: searchSymbols
      tags:
      - Symbols
definitions:
  SymbolData:
    type: object
    properties:
      symbol:
        type: string
        description: Symbol
      description:
        type: string
        description: Company name
      listed-market:
        type: string
        description: Listed Market
      price-increments:
        type: string
        description: Price Increments
      trading-hours:
        type: string
        description: Trading Hours
      options:
        type: boolean
        description: Has listed options
      instrument-type:
        type: string
        description: Instrument Type
